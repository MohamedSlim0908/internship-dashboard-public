</head>
<body>
<div class="grain" aria-hidden="true"></div>

<div class="app">
  <!-- Top bar (phone) / brand strip -->
  <header class="topbar">
    <a class="brand" href="#" data-act="nav" data-view="today" aria-label="Runway — go to Today">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M5 19 L12 5 L19 19 M8.2 13.4 H15.8"/></svg>
      </span>
      <span class="brand-word">Runway</span>
    </a>
    <span class="topbar-snap" id="snapPill"></span>
  </header>

  <!-- Navigation: bottom tab bar on phone, sidebar on desktop -->
  <nav class="nav" aria-label="Primary">
    <div class="nav-brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M5 19 L12 5 L19 19 M8.2 13.4 H15.8"/></svg>
      </span>
      <span>
        <span class="brand-word">Runway</span>
        <small id="navSnap"></small>
      </span>
    </div>
    <div class="nav-items" id="navItems"></div>
    <div class="nav-foot" id="navFoot"></div>
  </nav>

  <!-- View content renders here -->
  <main class="viewport" id="viewport" tabindex="-1"></main>
</div>

<!-- Full-screen offer detail -->
<div class="detail" id="detail" hidden aria-modal="true" role="dialog"></div>

<!-- Transient feedback -->
<div class="toast" id="toast" hidden></div>

<script src="data.js?v=20260521-2"></script>
